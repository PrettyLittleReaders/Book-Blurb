<style>
body {
  margin: 0;
  padding: 20px;

  font-family: 'Georgia', serif;

  background: linear-gradient(270deg, #000000, #2b0000, #660000, #1a0000, #000000);
  background-size: 800% 800%;
  animation: rippleBG 35s ease infinite;
}

@keyframes rippleBG {
  0% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}

/* Smoke */
body::before {
  content: "";
  position: fixed;
  width: 200%;
  height: 200%;
  background: radial-gradient(circle, rgba(255,0,0,0.08) 0%, transparent 70%);
  animation: smokeMove 60s linear infinite;
  pointer-events: none;
}

@keyframes smokeMove {
  0% { transform: translate(0,0) scale(1); }
  50% { transform: translate(-10%, -10%) scale(1.2); }
  100% { transform: translate(0,0) scale(1); }
}

/* Embers */
.embers {
  position: fixed;
  width: 100%;
  height: 100%;
  pointer-events: none;
}

.ember {
  position: absolute;
  width: 8px;
  height: 12px;
  background: radial-gradient(circle at 30% 30%, #ff4d4d, #800000);
  border-radius: 50%;
  opacity: 0.7;
  animation: fall linear infinite;
}

@keyframes fall {
  0% { transform: translateY(-10vh); opacity: 0; }
  10% { opacity: 1; }
  100% { transform: translateY(110vh) translateX(40px); opacity: 0; }
}

/* Title */
h1 {
  text-align: center;
  color: #ff4d4d;
  text-shadow: 0 0 15px rgba(255,0,0,0.8);
}

/* Container */
.container {
  max-width: 600px;
  margin: auto;
  background: rgba(0,0,0,0.8);
  padding: 25px;
  border-radius: 12px;
  box-shadow: 0 0 30px rgba(255,0,0,0.5);
}

/* Question */
.question {
  margin-bottom: 30px;
  font-size: 18px;
}

/* Answers */
.answers label {
  display: block;
  margin: 10px 0;
  cursor: pointer;
  color: #ffd6d6;
}

/* Button */
button {
  background: #990000;
  color: white;
  border: none;
  padding: 12px;
  font-size: 16px;
  cursor: pointer;
  border-radius: 6px;
  width: 100%;
  box-shadow: 0 0 10px rgba(255,0,0,0.6);
}

button:hover {
  background: #ff1a1a;
}

/* Popup base */
#popupOverlay {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.9);
  display: none;
  justify-content: center;
  align-items: center;

  background: #1a0000;

  text-align: center;

/* Name popup */

  background: #330000;

.blur {

// Week logic
function getWeekNumberMonday() {
  const now = new Date();
  now.setHours(0, 0, 0, 0);

  const day = now.getDay();
  const diffToMonday = (day === 0 ? -6 : 1 - day);

  const monday = new Date(now);
  monday.setDate(now.getDate() + diffToMonday);

  const startMonday = new Date(2024, 0, 1); // anchor Monday

  const diffWeeks = Math.floor(
    (monday - startMonday) / (7 * 24 * 60 * 60 * 1000)
  );

  return diffWeeks;
}

function generateQuiz() {
  const form = document.getElementById("quizForm");
  form.innerHTML = "";

  const week = getWeekNumberMonday();
  const index = week % questionBank.length;

  let q = questionBank[index];

  let div = document.createElement("div");
  div.classList.add("question");

  let html = `<p><b>BOTW:</b> ${q.question}</p><div class="answers">`;

  q.answers.forEach((a) => {
    html += `
      <label>
        <input type="radio" name="q0" value="${a.score}">
        ${a.text}
      </label>
    `;
  });

  html += `</div>`;
  div.innerHTML = html;
  form.appendChild(div);
}

// Save name from popup
function saveName() {
  let input = document.getElementById("nameInput").value.trim();

  if (input === "") {
    alert("Enter your name 🔥");
    return;
  }

  userName = input;
  document.getElementById("nameOverlay").style.display = "none";
}

// Submit
function submitQuiz() {
  let selected = document.querySelector(`input[name="q0"]:checked`);
  let score = selected ? parseInt(selected.value) : 0;

  // Get current question again
  const week = getWeekNumberMonday();
  const index = week % questionBank.length;
  let q = questionBank[index];

  // Find correct answer
  let correctAnswer = q.answers.find(a => a.score === 1).text;

  let result = "";

  if (score === 1) {
    result = `👑 ${userName}, you got it right — Welcome to the Bookish Elite...this week..`;
  } else {
    result = `
      💔 ${userName}, awesome try, but not quite…<br><br>
      📖 <b>Correct Answer:</b> ${correctAnswer}
    `;
  }

  document.getElementById("popupResult").innerHTML = result;
  document.getElementById("popupOverlay").style.display = "flex";

  document.getElementById("mainContent").classList.add("blur");
  document.getElementById("title").classList.add("blur");
}

// Embers
function createEmbers() {
  const container = document.getElementById("embers");

  for (let i = 0; i < 30; i++) {
    let ember = document.createElement("div");
    ember.classList.add("ember");

    ember.style.left = Math.random() * 100 + "vw";
    ember.style.animationDuration = (6 + Math.random() * 10) + "s";

    container.appendChild(ember);
  }
}

generateQuiz();
createEmbers();
